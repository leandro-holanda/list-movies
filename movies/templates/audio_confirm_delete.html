{% extends 'base.html' %}
{% block title %}Excluir Áudio{% endblock %}
{% block content %}
  <div class="hero">
    <h1>Confirmar Exclusão</h1>
  </div>

  <div class="row">
    <div class="col-md-6 offset-md-3">
      <div style="background: rgba(255,107,107,0.1); border: 1px solid #ff6b6b; border-radius: 8px; padding: 2rem; text-align: center;">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ff6b6b; display: block; margin-bottom: 1rem;"></i>
        <h4 style="color: white; margin-bottom: 1rem;">Tem certeza?</h4>
        <p class="text-muted mb-3">
          Você está prestes a excluir <strong style="color: white;">{{ object }}</strong>. Esta ação não pode ser desfeita.
        </p>
        <form method="post" style="display: inline;">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <a class="btn btn-secondary flex-grow-1" href="{% url 'audio_list' %}">
              <i class="fas fa-arrow-left"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-outline-danger flex-grow-1">
              <i class="fas fa-trash"></i> Excluir
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
